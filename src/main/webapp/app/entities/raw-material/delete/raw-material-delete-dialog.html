@if (rawMaterial) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(rawMaterial.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="rawMaterialDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirme a exclusão</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-rawMaterial-heading"
        jhiTranslate="greatErpApp.rawMaterial.delete.question"
        [translateValues]="{ id: rawMaterial.id }"
      >
        Tem certeza de que deseja excluir Raw Material {{ rawMaterial.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-rawMaterial" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Excluir</span>
      </button>
    </div>
  </form>
}
